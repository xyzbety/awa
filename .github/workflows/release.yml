name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  # ─── Version-consistency gate ────────────────────────────────────────
  # Runs first and gates everything else. A mismatch between the git tag
  # and the workspace Cargo.toml version means the published crates/wheels
  # will disagree with the GitHub release / Docker tag — fail early.
  version-check:
    name: Verify version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Tag matches Cargo.toml versions
        shell: bash
        # Real TOML parse via stdlib `tomllib` (Python 3.11+). Ubuntu runners
        # ship Python ≥3.12, so no install step needed. `grep` worked for the
        # current layout but is brittle against future drift (multi-line
        # strings, commented lines, a stray `version = ...` in a sibling
        # table).
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os, sys, tomllib

          expected = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          print(f"Git tag:          {os.environ['GITHUB_REF_NAME']}")
          print(f"Expected version: {expected}")

          def cargo_version(path: str) -> str | None:
              with open(path, "rb") as f:
                  data = tomllib.load(f)
              return (
                  data.get("package", {}).get("version")
                  or data.get("workspace", {}).get("package", {}).get("version")
              )

          def pyproject_version(path: str) -> str | None:
              with open(path, "rb") as f:
                  data = tomllib.load(f)
              return data.get("project", {}).get("version")

          def ui_extra_pin(path: str) -> str | None:
              # The `awa-pg[ui]` extra pins awa-cli to an exact version so the
              # standalone-binary route stays in lockstep with the SDK wheel.
              # Drift here ships a wheel that pip can't resolve.
              with open(path, "rb") as f:
                  data = tomllib.load(f)
              extras = data.get("project", {}).get("optional-dependencies", {})
              for spec in extras.get("ui", []):
                  if spec.startswith("awa-cli=="):
                      return spec.split("==", 1)[1]
              return None

          checks = [
              ("Cargo.toml", cargo_version("Cargo.toml")),
              ("awa-cli/pyproject.toml", pyproject_version("awa-cli/pyproject.toml")),
              ("awa-python/Cargo.toml", cargo_version("awa-python/Cargo.toml")),
              ("awa-python/pyproject.toml", pyproject_version("awa-python/pyproject.toml")),
              ("awa-python/pyproject.toml [ui] extra", ui_extra_pin("awa-python/pyproject.toml")),
          ]

          fail = 0
          for file, value in checks:
              if value is None:
                  print(f"::error file={file}::could not read version from {file}")
                  fail = 1
              elif value != expected:
                  print(f"::error file={file}::version mismatch: {file} says '{value}', tag says '{expected}'")
                  fail = 1
              else:
                  print(f"ok: {file} = {value}")

          sys.exit(fail)
          PY

  # ─── Cross-compile CLI binaries ──────────────────────────────────────
  build-binaries:
    name: Build — ${{ matrix.target }}
    needs: [version-check]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            release_asset: true
            docker_asset: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            release_asset: true
            docker_asset: true
          - target: x86_64-apple-darwin
            os: macos-latest
            release_asset: true
            docker_asset: false
          - target: aarch64-apple-darwin
            os: macos-latest
            release_asset: true
            docker_asset: false
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure target installed
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross --tag v0.2.5 --locked

      # Frontend must be built before cargo so rust-embed in awa-ui picks it up.
      # Without this the binary ships the "Frontend not built" placeholder (#162).
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: awa-ui/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: awa-ui/frontend
        run: npm ci

      - name: Build frontend
        working-directory: awa-ui/frontend
        run: npm run build

      - name: Verify frontend was embedded
        shell: bash
        run: |
          set -euo pipefail
          test -f awa-ui/static/index.html
          # Vite emits hashed asset references; their absence means the build
          # produced a degenerate index (or didn't run).
          if ! grep -q '/assets/' awa-ui/static/index.html; then
            echo "::error::awa-ui/static/index.html does not reference /assets/* — Vite build produced no frontend bundle"
            cat awa-ui/static/index.html
            exit 1
          fi
          test -d awa-ui/static/assets
          ls awa-ui/static/assets/ | grep -q '\.js$'
          ls awa-ui/static/assets/ | grep -q '\.css$'

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --package awa-cli --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --package awa-cli --target ${{ matrix.target }}

      # Smoke-test the binary: start `awa serve` against an ephemeral Postgres
      # and verify GET / returns the built frontend, not the placeholder page.
      # Runs only on the x86_64 Linux job — the binary from aarch64-musl cross
      # cannot execute on the runner, and macOS runners don't have Docker.
      - name: Smoke-test embedded frontend
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          set -euo pipefail
          # Single trap covers every failure path — serve may not be started
          # yet when we exit (migrate failure, pg startup timeout), so guard
          # the kill with :-.
          serve_pid=
          cleanup() {
            [ -n "${serve_pid}" ] && kill "${serve_pid}" 2>/dev/null || true
            docker rm -f awa-smoke-pg >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker run -d --name awa-smoke-pg \
            -e POSTGRES_PASSWORD=test -e POSTGRES_DB=awa_test \
            -p 15432:5432 postgres:17-alpine
          # `pg_isready` checks the socket, which can return true while
          # initdb is still creating the `awa_test` database on first boot —
          # the next client connection then gets "Connection reset by peer".
          # Poll with an actual query against the target DB instead.
          for _ in $(seq 1 60); do
            if docker exec -e PGPASSWORD=test awa-smoke-pg \
                 psql -U postgres -d awa_test -tAc 'SELECT 1' >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          DATABASE_URL="postgres://postgres:test@localhost:15432/awa_test"
          bin="target/${{ matrix.target }}/release/awa"
          "${bin}" --database-url "${DATABASE_URL}" migrate
          "${bin}" --database-url "${DATABASE_URL}" serve --host 127.0.0.1 --port 3000 &
          serve_pid=$!

          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3000/api/capabilities >/dev/null; then break; fi
            sleep 1
          done

          body=$(curl -sf http://127.0.0.1:3000/)
          if echo "${body}" | grep -qi "Frontend not built"; then
            echo "::error::awa serve is returning the placeholder page — the frontend was not embedded"
            echo "${body}"
            exit 1
          fi
          if ! echo "${body}" | grep -q "/assets/"; then
            echo "::error::awa serve / did not reference any /assets/* paths — the embedded frontend looks wrong"
            echo "${body}"
            exit 1
          fi
          echo "ok: embedded frontend reachable via GET /"

          # And while we're here, sanity-check `awa --version` reports the tag.
          awa_version=$("${bin}" --version | awk '{print $NF}')
          expected="${GITHUB_REF_NAME#v}"
          if [ "${awa_version}" != "${expected}" ]; then
            echo "::error::awa --version '${awa_version}' does not match tag '${expected}'"
            exit 1
          fi
          echo "ok: awa --version = ${awa_version}"

      - name: Package binary
        if: matrix.release_asset
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE="awa-${TAG}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE}"
          cp "target/${{ matrix.target }}/release/awa" "${ARCHIVE}/"
          cp README.md LICENSE* "${ARCHIVE}/" 2>/dev/null || true
          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          echo "ARCHIVE=${ARCHIVE}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload release artifact
        if: matrix.release_asset
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

      - name: Prepare Docker binary
        if: matrix.docker_asset
        shell: bash
        run: |
          mkdir -p docker-dist
          ARCH="${{ matrix.target }}"
          if [[ "$ARCH" == *"x86_64"* ]]; then DOCKER_ARCH="amd64"; else DOCKER_ARCH="arm64"; fi
          install -Dm755 "target/${{ matrix.target }}/release/awa" "docker-dist/awa-${DOCKER_ARCH}"

      - name: Upload Docker binary
        if: matrix.docker_asset
        uses: actions/upload-artifact@v7
        with:
          name: docker-binary-${{ matrix.target }}
          path: docker-dist/

  # ─── Multi-arch Docker image ─────────────────────────────────────────
  docker:
    name: Docker — CLI
    needs: [build-binaries]
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: awa
      IMAGE_REGISTRY: ghcr.io
      IMAGE_REPOSITORY: hardbyte
    steps:
      - uses: actions/checkout@v6

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Linux binaries
        uses: actions/download-artifact@v8
        with:
          pattern: docker-binary-*
          path: dist
          merge-multiple: true

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      # Smoke-test BEFORE pushing so a broken image never lands in the registry.
      # We build a local single-platform (amd64) image, boot it against an
      # ephemeral Postgres, and verify GET / returns the embedded frontend,
      # not the "Frontend not built" placeholder (#162). We also check
      # `awa --version` matches the git tag.
      - name: Build local image for smoke test
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.runtime
          push: false
          load: true
          platforms: linux/amd64
          tags: awa:smoke

      - name: Smoke-test local image
        shell: bash
        run: |
          set -euo pipefail
          expected="${GITHUB_REF_NAME#v}"
          image="awa:smoke"

          docker network create awa-smoke >/dev/null
          trap 'docker rm -f awa-smoke-pg awa-smoke-app >/dev/null 2>&1 || true; docker network rm awa-smoke >/dev/null 2>&1 || true' EXIT

          docker run -d --name awa-smoke-pg --network awa-smoke \
            -e POSTGRES_PASSWORD=test -e POSTGRES_DB=awa_test \
            postgres:17-alpine >/dev/null
          # pg_isready can pass while initdb is still setting up the
          # `awa_test` database; next client connection resets. Query the
          # target DB directly until it responds.
          for _ in $(seq 1 60); do
            if docker exec -e PGPASSWORD=test awa-smoke-pg \
                 psql -U postgres -d awa_test -tAc 'SELECT 1' >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          DATABASE_URL="postgres://postgres:test@awa-smoke-pg:5432/awa_test"
          docker run --rm --network awa-smoke \
            "${image}" --database-url "${DATABASE_URL}" migrate

          docker run -d --name awa-smoke-app --network awa-smoke \
            -p 3000:3000 \
            "${image}" --database-url "${DATABASE_URL}" serve --host 0.0.0.0 --port 3000 >/dev/null

          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3000/api/capabilities >/dev/null; then break; fi
            sleep 1
          done

          body=$(curl -sf http://127.0.0.1:3000/)
          if echo "${body}" | grep -qi "Frontend not built"; then
            echo "::error::Docker image serves the placeholder page — the frontend was not embedded"
            echo "${body}"
            docker logs awa-smoke-app || true
            exit 1
          fi
          if ! echo "${body}" | grep -q "/assets/"; then
            echo "::error::Docker image GET / did not reference /assets/* — embedded frontend looks wrong"
            echo "${body}"
            exit 1
          fi

          awa_version=$(docker run --rm "${image}" --version | awk '{print $NF}')
          if [ "${awa_version}" != "${expected}" ]; then
            echo "::error::Docker awa --version '${awa_version}' does not match tag '${expected}'"
            exit 1
          fi
          echo "ok: ${image} serves built frontend and reports version ${awa_version}"

      - name: Build and push (multi-arch)
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.runtime
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: Sign image with cosign
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true

  # ─── GitHub Release ──────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [build-binaries, python-wheels, cli-wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "{binary-*,wheels-*,cli-wheels-*}"
          merge-multiple: true

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" --json tagName >/dev/null 2>&1; then
            prerelease_flag=""
            if echo "$tag" | grep -qE 'alpha|beta|rc'; then
              prerelease_flag="--prerelease"
            fi
            gh release create "$tag" --title "$tag" --generate-notes --draft $prerelease_flag
          fi

      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          for f in *.tar.gz *.whl; do
            [ -e "$f" ] && gh release upload "$tag" "$f" --clobber
          done

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false

  # ─── Python wheels (maturin) ─────────────────────────────────────────
  python-wheels:
    name: Python wheels — ${{ matrix.target }}
    needs: [version-check]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
            maturin-interpreter: python3.10
          - os: ubuntu-24.04-arm
            target: aarch64
            manylinux: auto
            maturin-interpreter: python3.10
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist --manifest-path awa-python/Cargo.toml ${{ matrix.maturin-interpreter && format('-i {0}', matrix.maturin-interpreter) || '' }}
          before-script-linux: |
            # Install Postgres dev headers for sqlx compilation
            apt-get update && apt-get install -y libpq-dev || true

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  # ─── CLI wheels (maturin, bindings=bin) ──────────────────────────────
  cli-wheels:
    name: CLI wheels — ${{ matrix.target }}
    needs: [version-check]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          - os: ubuntu-24.04-arm
            target: aarch64
            manylinux: auto
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Frontend must be built before maturin invokes cargo so rust-embed in
      # awa-ui picks it up — the CLI wheel otherwise ships the "Frontend not
      # built" placeholder (#162).
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: awa-ui/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: awa-ui/frontend
        run: npm ci

      - name: Build frontend
        working-directory: awa-ui/frontend
        run: npm run build

      - name: Verify frontend was embedded
        shell: bash
        run: |
          set -euo pipefail
          test -f awa-ui/static/index.html
          # Vite emits hashed asset references; their absence means the build
          # produced a degenerate index (or didn't run).
          if ! grep -q '/assets/' awa-ui/static/index.html; then
            echo "::error::awa-ui/static/index.html does not reference /assets/* — Vite build produced no frontend bundle"
            cat awa-ui/static/index.html
            exit 1
          fi
          test -d awa-ui/static/assets
          ls awa-ui/static/assets/ | grep -q '\.js$'
          ls awa-ui/static/assets/ | grep -q '\.css$'

      - name: Build CLI wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist --manifest-path awa-cli/Cargo.toml
          before-script-linux: |
            apt-get update && apt-get install -y libpq-dev || true

      - name: Upload CLI wheels
        uses: actions/upload-artifact@v7
        with:
          name: cli-wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  # ─── Publish Python SDK to PyPI ──────────────────────────────────────
  publish-pypi-sdk:
    name: Publish SDK to PyPI
    needs: [python-wheels]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Download SDK wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ─── Publish CLI to PyPI ────────────────────────────────────────────
  publish-pypi-cli:
    name: Publish CLI to PyPI
    needs: [cli-wheels]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Download CLI wheels
        uses: actions/download-artifact@v8
        with:
          pattern: cli-wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ─── Publish Rust crates ─────────────────────────────────────────────
  #
  # Authentication: crates.io Trusted Publishing via GitHub OIDC.
  # `rust-lang/crates-io-auth-action` exchanges the workflow's OIDC token
  # for a short-lived crates.io token (~30 minutes). No long-lived
  # CARGO_REGISTRY_TOKEN secret needed. Each crate must have a Trusted
  # Publisher entry configured on crates.io (Settings → Trusted
  # Publishing) matching this repo + workflow filename. New crates use
  # the "Pending Publisher" flow on crates.io to bootstrap before the
  # first publish.
  publish-crates:
    name: Publish to crates.io
    needs: [version-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Authenticate to crates.io (OIDC)
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@v1

      # awa-ui embeds `awa-ui/static/` via rust-embed; without building the
      # frontend first, the crate published to crates.io carries no assets and
      # every downstream `cargo install awa-cli` bakes in the placeholder HTML
      # (#162).
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: awa-ui/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: awa-ui/frontend
        run: npm ci

      - name: Build frontend
        working-directory: awa-ui/frontend
        run: npm run build

      - name: Verify frontend was embedded
        shell: bash
        run: |
          set -euo pipefail
          test -f awa-ui/static/index.html
          # Vite emits hashed asset references; their absence means the build
          # produced a degenerate index (or didn't run).
          if ! grep -q '/assets/' awa-ui/static/index.html; then
            echo "::error::awa-ui/static/index.html does not reference /assets/* — Vite build produced no frontend bundle"
            cat awa-ui/static/index.html
            exit 1
          fi
          test -d awa-ui/static/assets
          ls awa-ui/static/assets/ | grep -q '\.js$'
          ls awa-ui/static/assets/ | grep -q '\.css$'

      - name: Publish awa-macros
        run: cargo publish --package awa-macros --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}

      - name: Wait for index
        run: sleep 30

      - name: Publish awa-model
        run: cargo publish --package awa-model --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}

      - name: Wait for index
        run: sleep 30

      # awa-metrics depends on awa-model and is depended on by awa-worker,
      # so it must publish in this slot. First publish auto-creates the
      # crate on crates.io under the token owner's namespace.
      - name: Publish awa-metrics
        run: cargo publish --package awa-metrics --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for index
        run: sleep 30

      - name: Publish awa-worker
        run: cargo publish --package awa-worker --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}

      - name: Wait for index
        run: sleep 30

      - name: Publish awa-testing
        run: cargo publish --package awa-testing --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}

      - name: Wait for index
        run: sleep 30

      # `npm run build` earlier in this job empties `awa-ui/static/` and
      # removes the tracked `.gitkeep` (Vite's `emptyOutDir: true`), and
      # re-populates it with the real bundle. That leaves the working tree
      # dirty at publish time — which is exactly what we want, since the
      # built bundle IS what we're shipping. `--allow-dirty` is how cargo
      # consents to that; the `include` list in `awa-ui/Cargo.toml` is what
      # actually gets the bundle into the .crate file (gitignored paths are
      # otherwise skipped for git-backed packages).
      - name: Publish awa-ui
        run: cargo publish --package awa-ui --no-verify --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}

      - name: Wait for index
        run: sleep 30

      - name: Publish awa-cli
        run: cargo publish --package awa-cli --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}

      - name: Wait for index
        run: sleep 30

      - name: Publish awa (facade)
        run: cargo publish --package awa --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
