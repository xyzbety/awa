\* Lock-ordering protocol check: claim/complete/rotate/prune against the
\* Rust storage engine's lock plan, including the ADR-023 claim-ring
\* family. Expected to pass — if any invariant trips, a future refactor
\* has broken the lock contract.
CONSTANTS
  TxIds = {"t1", "t2"}
  Queues = {"q1", "q1#0", "q1#1"}
  StripeA = "q1#0"
  StripeB = "q1#1"
  Priorities = {1}
  LeaseSlots = {1, 2}
  ReadySlots = {1, 2}
  ClaimSlots = {1, 2}

SPECIFICATION Spec

INVARIANTS
  TypeOK
  LockCompatibility
  HeldOnlyByRunningTxs
  NoDeadlock
  NoGlobalStall
